# config/settings.yaml
# Configuration settings for Graph RAG - sử dụng Ollama và Neo4j

# Ollama LLM Configuration (Local)
ollama:
  url: "http://localhost:11434/api/generate"
  model: "mistral"  # Có thể thay đổi: llama2, codellama, mistral, phi, etc.
  temperature: 0.7
  max_tokens: 1000
  stream: false
  timeout: 120  # Timeout trong seconds

# Neo4j Configuration (loaded from environment variables)
neo4j:
  uri: "${NEO4J_URI}"
  user: "${NEO4J_USER}"
  password: "${NEO4J_PASSWORD}"
  database: "${NEO4J_DB}"

# Retrieval Configuration
retrieval:
  graph_weight: 0.7
  vector_weight: 0.3
  max_results: 10
  subgraph_depth: 2

# Data Processing
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  embeddings_dir: "data/embeddings"
  supported_formats: ["pdf", "txt", "csv", "json", "docx"]

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  title: "Graph RAG API"
  version: "1.0.0"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

